#!/usr/bin/env bash
# Shared policy: sourced by PATH wrappers and hooks.
# Single source of truth for what Claude can/cannot do unsupervised.

# --- Git ---
# Read-only commands (always allowed)
GIT_ALLOWED_READONLY=(
	status log diff show blame shortlog describe
	branch remote tag stash
	ls-files ls-tree rev-parse rev-list
	name-rev reflog grep log
	config count-objects fsck
	cat-file for-each-ref
	fetch
)

# Write commands allowed without approval (commit requires user presence)
GIT_ALLOWED_WRITE=(add)

# Subcommands blocked unconditionally (subprocess safety)
GIT_BLOCKED=(
	push
	"reset --hard"
	clean
	rebase
	"checkout --"
	"stash drop"
	"stash clear"
)

# Flags blocked on otherwise-allowed commands (commit is fully blocked via allowlist,
# but keep this for defense-in-depth if commit is ever re-allowed)
GIT_BLOCKED_FLAGS_COMMIT=(--amend)

# --- Terraform ---
TERRAFORM_ALLOWED=(plan init validate fmt output show "state list" "state show" console providers version workspace)
TERRAFORM_BLOCKED=(apply destroy import taint untaint "state rm" "state mv" "state push")

# --- Always blocked binaries ---
ALWAYS_BLOCKED=(rm dd)

# --- SSH ---
# Block commands that enable remote writes (push over SSH)
SSH_BLOCKED_COMMANDS=(git-receive-pack)
