#!/usr/bin/env bash
# Shared policy: sourced by PATH wrappers and hooks.
# Single source of truth for what Claude can/cannot do unsupervised.

# --- Git ---
# Read-only commands (always allowed)
GIT_ALLOWED_READONLY=(
	status log diff show blame shortlog describe
	branch remote tag stash
	ls-files ls-tree rev-parse rev-list
	name-rev reflog grep log
	config count-objects fsck
	cat-file for-each-ref
	fetch
)

# Write commands: anything not in GIT_ALLOWED_READONLY requires interactive confirmation

# --- Terraform ---
# Read-only commands (always allowed)
TERRAFORM_ALLOWED_READONLY=(plan init validate fmt output show state console providers version workspace)

# --- Always blocked binaries ---
ALWAYS_BLOCKED=(rm dd)

# --- SSH ---
# Block commands that enable remote writes (push over SSH)
SSH_BLOCKED_COMMANDS=(git-receive-pack)
